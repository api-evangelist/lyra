name: Lyra
description: Lyra (now Derive) is an institutional-grade options AMM protocol built on Ethereum, offering REST and WebSocket APIs for querying options boards, strike prices, implied volatility, trading positions, and liquidity pool analytics. The platform provides onchain options and perpetual futures trading with TradFi-level speed via an OP Stack rollup (Chain ID 957).
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/lyra/refs/heads/main/apis.yml
created: '2026-06-14'
modified: '2026-06-14'
specificationVersion: '0.19'
tags:
  - Options
  - AMM
  - DeFi
  - Derivatives
  - Implied Volatility
  - Perpetuals
  - Crypto
  - Finance
apis:
  - name: Lyra Public REST API
    description: Public REST API endpoints for querying market data, instruments, tickers, options boards, implied volatility, settlement history, and liquidity pool analytics without authentication.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.derive.xyz/
    baseURL: https://api.lyra.finance
    tags:
      - Options
      - Market Data
      - Instruments
      - Implied Volatility
      - Settlement
    properties:
      - type: Documentation
        url: https://docs.derive.xyz/
      - type: OpenAPI
        url: https://docs.derive.xyz/llms.txt
    contact:
      - FN: Derive (Lyra) Support
        url: https://discord.com/invite/derive
    meta:
      - name: API Version
        value: v2.2
  - name: Lyra Private REST API
    description: Authenticated REST API endpoints for managing subaccounts, submitting and cancelling orders, transferring collateral and positions, accessing order history, handling RFQs, and performing margin calculations. Authentication uses wallet-signed session keys.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.derive.xyz/
    baseURL: https://api.lyra.finance
    tags:
      - Options Trading
      - Orders
      - Positions
      - Collateral
      - RFQ
      - Margin
    properties:
      - type: Documentation
        url: https://docs.derive.xyz/
      - type: Authentication
        url: https://docs.derive.xyz/reference/authentication
    contact:
      - FN: Derive (Lyra) Support
        url: https://discord.com/invite/derive
    meta:
      - name: API Version
        value: v2.2
  - name: Lyra WebSocket API
    description: WebSocket API for real-time streaming of market data, order book updates, ticker subscriptions, and private account notifications. Authentication uses wallet-signed timestamps via the login endpoint.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.derive.xyz/
    baseURL: wss://api.lyra.finance
    tags:
      - WebSocket
      - Real-Time
      - Market Data
      - Streaming
      - Subscriptions
    properties:
      - type: Documentation
        url: https://docs.derive.xyz/
    contact:
      - FN: Derive (Lyra) Support
        url: https://discord.com/invite/derive
    meta:
      - name: API Version
        value: v2.2
